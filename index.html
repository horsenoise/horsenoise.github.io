<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>horsenoise news</title>
<style>
  body {
    font-family: "Arial", sans-serif;
    background: white;
    color: black;
    margin: 0;
    padding: 0;
  }

  /* container for the page */
  .container {
    max-width: 800px;
    margin: 0 auto;
    padding: 20px;
  }

  /* header */
  header {
    text-align: center;
    margin-bottom: 30px;
  }
  header h1 {
    font-size: 36px;
    font-weight: bold;
    margin: 0;
  }

  /* headlines */
  .headline {
    font-size: 24px;
    font-weight: bold;
    margin: 15px 0;
  }
  .subheadline {
    font-size: 18px;
    margin: 8px 0;
  }

  /* links */
  a {
    text-decoration: none;
    color: black;
  }
  a:hover {
    text-decoration: underline;
  }

  /* small top links like drudge report */
  .top-links {
    font-size: 14px;
    text-align: center;
    margin-bottom: 40px;
  }
  .top-links a {
    margin: 0 10px;
  }

  hr {
    border: none;
    border-top: 1px solid #000;
    margin: 20px 0;
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>horsenoise</h1>
  </header>

  <div class="top-links">
    <a href="#">Home</a> | 
    <a href="#">World</a> | 
    <a href="#">Politics</a> | 
    <a href="#">Business</a> | 
    <a href="#">Tech</a>
  </div>

  <hr>

  <!-- main headlines -->
  <div class="headline"><a href="#">MAIN STORY HEADLINE</a></div>
  <div class="subheadline"><a href="#">Secondary story headline</a></div>
  <div class="subheadline"><a href="#">Another headline here</a></div>

  <hr>

  <!-- stacked links section -->
  <div class="headline"><a href="#">Top Stories</a></div>
  <div class="subheadline"><a href="#">Story 1 placeholder</a></div>
  <div class="subheadline"><a href="#">Story 2 placeholder</a></div>
  <div class="subheadline"><a href="#">Story 3 placeholder</a></div>
  <div class="subheadline"><a href="#">Story 4 placeholder</a></div>

  <hr>

  <div class="headline"><a href="#">More News</a></div>
  <div class="subheadline"><a href="#">Story 5 placeholder</a></div>
  <div class="subheadline"><a href="#">Story 6 placeholder</a></div>
  <div class="subheadline"><a href="#">Story 7 placeholder</a></div>
</div>
</body>
</html>
