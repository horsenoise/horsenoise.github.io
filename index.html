<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>horsenoise login</title>
<style>
/* hover effect for the request link */
.request-link {
    color: red;
    text-decoration: none;
    font-family: 'Times New Roman', Times, serif;
    font-size: 10pt; /* normal size */
    transition: font-size 0.2s; /* smooth transition */
}
.request-link:hover {
    font-size: 12pt; /* grows on hover */
}
</style>
</head>
<body bgcolor="white" text="black">

<!-- TOP LEFT X LOGO -->
<div style="width:800px; margin:auto; position:relative; height:40px;">
    <a href="https://x.com/thishorsenoise" target="_blank" style="position:absolute; top:8px; left:0;">
        <img src="https://raw.githubusercontent.com/horsenoise/horsenoise.github.io/refs/heads/master/xlogo.png" alt="X Logo" style="height:28px; width:auto;">
    </a>
</div>

<table width="800" align="center" border="0" cellpadding="0" cellspacing="0">
    
    <!-- LOGO -->
    <tr>
        <td align="center" height="100">
            <img src="https://raw.githubusercontent.com/horsenoise/horsenoise.github.io/refs/heads/master/templogo.png" alt="HORSENOISE Logo" style="max-height: 240px;">
        </td>
    </tr>

    <!-- HORSENOISE TEXT -->
    <tr>
        <td align="center" height="80">
            <h1 style="
                font-family: 'Times New Roman', Times, serif;
                font-weight: bold;
                font-style: italic;
                font-size: 60px;
                color: black;
                text-shadow: 2px 2px 2px #888888;
                margin: 0;
                letter-spacing: 2px;
            ">
                HORSENOISE
            </h1>
        </td>
    </tr>

    <!-- LINE -->
    <tr>
        <td height="1" bgcolor="black"></td>
    </tr>

    <!-- LOGIN FORM -->
    <tr>
        <td>
            <table width="100%" cellpadding="20">
                <tr>
                    <td align="center">
                        <font face="Times New Roman, serif" size="2" color="black"><b>LOGIN TO HORSENOISE</b></font><br><br>
                        <form id="loginForm" style="font-family: 'Times New Roman', Times, serif; font-size: 16px;">
                            <label for="username">username:</label><br>
                            <input type="text" id="username" style="width: 250px; padding: 5px;" required><br><br>
                            <label for="password">password:</label><br>
                            <input type="password" id="password" style="width: 250px; padding: 5px;" required><br><br>
                            <input type="submit" value="login" style="font-size:16px; padding:5px 20px; background:black; color:white; border:none; cursor:pointer;">
                        </form>
                        <br>
                        <font size="2" color="red">
                            don't have an account? 
                            <a href="mailto:horsenoise@gmail.com" class="request-link">
                                request one!
                            </a>
                        </font>
                    </td>
                </tr>
            </table>
        </td>
    </tr>

    <tr>
        <td height="1" bgcolor="black"></td>
    </tr>

    <tr>
        <td align="center" height="40">
            <font face="Times New Roman, serif" size="2" color="black">&copy; 2026 HNN</font>
        </td>
    </tr>

</table>

<script>
const users = {
    "horsenoise": "Booguso!23",
    "guest": "AmericaFirst!"
};

document.getElementById('loginForm').addEventListener('submit', function(e){
    e.preventDefault();
    const u = document.getElementById('username').value;
    const p = document.getElementById('password').value;

    if(users[u] && users[u] === p){
        sessionStorage.setItem('loggedIn', 'true');
        window.location.href = "home.html";
    } else {
        alert("invalid username or password");
        window.location.href = "https://horsenoise.github.io";
    }
});
</script>

</body>
</html>
