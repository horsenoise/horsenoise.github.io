<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>horsenoise</title>
<style>
  body {
    font-family: "Times New Roman", serif;
    background: white;
    color: black;
    margin: 0;
    padding: 0;
  }

  .container {
    max-width: 800px;
    margin: 0 auto;
    padding: 20px;
  }

  header {
    text-align: center;
    margin-bottom: 30px;
  }

  header img {
    width: 400px; /* header width */
    height: auto;
  }

  .top-links {
    font-size: 14px;
    text-align: center;
    margin-bottom: 30px;
  }
  .top-links a {
    margin: 0 10px;
    text-decoration: none;
    color: black;
    font-weight: bold;
  }
  .top-links a:hover {
    text-decoration: underline;
  }

  hr {
    border: none;
    border-top: 1px solid #000;
    margin: 20px 0;
  }

  .headline {
    font-size: 28px;
    font-weight: bold;
    margin: 15px 0;
    text-transform: uppercase;
  }

  .subheadline {
    font-size: 18px;
    margin: 8px 0;
    text-transform: uppercase;
  }

  /* red emphasis */
  a.red {
    color: red;
    text-decoration: none;
  }
  a.black {
    color: black;
    text-decoration: none;
  }
  a:hover {
    text-decoration: underline;
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <img src="https://raw.githubusercontent.com/horsenoise/horsenoise.github.io/refs/heads/master/temporarylogoHN.png" alt="horsenoise logo">
  </header>

  <div class="top-links">
    <a href="#">HOME</a> | 
    <a href="#">WORLD</a> | 
    <a href="#">POLITICS</a> | 
    <a href="#">BUSINESS</a> | 
    <a href="#">TECH</a>
  </div>

  <hr>

  <!-- main headlines top to bottom -->
  <div class="headline"><a class="red" href="#">MAIN STORY HEADLINE</a></div>
  <div class="subheadline"><a class="black" href="#">SECONDARY STORY HEADLINE</a></div>
  <div class="subheadline"><a class="red" href="#">ANOTHER HEADLINE HERE</a></div>
  <div class="subheadline"><a class="black" href="#">YET ANOTHER HEADLINE</a></div>

  <hr>

  <!-- stacked top stories -->
  <div class="headline"><a class="black" href="#">TOP STORIES</a></div>
  <div class="subheadline"><a class="red" href="#">STORY 1 PLACEHOLDER</a></div>
  <div class="subheadline"><a class="black" href="#">STORY 2 PLACEHOLDER</a></div>
  <div class="subheadline"><a class="red" href="#">STORY 3 PLACEHOLDER</a></div>
  <div class="subheadline"><a class="black" href="#">STORY 4 PLACEHOLDER</a></div>

  <hr>

  <div class="headline"><a class="black" href="#">MORE NEWS</a></div>
  <div class="subheadline"><a class="red" href="#">STORY 5 PLACEHOLDER</a></div>
  <div class="subheadline"><a class="black" href="#">STORY 6 PLACEHOLDER</a></div>
  <div class="subheadline"><a class="red" href="#">STORY 7 PLACEHOLDER</a></div>

</div>
</body>
</html>
