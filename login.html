<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>horsenoise login</title>
</head>
<body bgcolor="white" text="black">

<!-- Main Container Table (Centers everything and sets width) -->
<table width="800" align="center" border="0" cellpadding="0" cellspacing="0">
    
    <!-- LOGO IMAGE ROW -->
    <tr>
        <td align="center" valign="middle" height="100" bgcolor="white">
            <img src="https://raw.githubusercontent.com/horsenoise/horsenoise.github.io/refs/heads/master/templogo.png" alt="HORSENOISE Logo" style="max-height: 240px;">
        </td>
    </tr>

    <!-- HORSENOISE TEXT -->
    <tr>
        <td align="center" valign="middle" height="80" bgcolor="white">
            <h1 style="font-family: 'Times New Roman', Times, serif; color: black; text-shadow: 3px 3px 0 #888888; font-size: 60px; margin: 0;">
                HORSENOISE
            </h1>
        </td>
    </tr>

    <!-- TOP NAVIGATION LINKS -->
    <tr>
        <td align="center" valign="middle" height="30">
            <font face="Times New Roman, serif" size="2" color="black">
                <b>
                <a href="#" style="text-decoration: none; color: black;">HOME</a> | 
                <a href="#" style="text-decoration: none; color: black;">WORLD</a> | 
                <a href="#" style="text-decoration: none; color: black;">POLITICS</a> | 
                <a href="#" style="text-decoration: none; color: black;">BUSINESS</a> | 
                <a href="#" style="text-decoration: none; color: black;">TECH</a>
                </b>
            </font>
        </td>
    </tr>

    <!-- HORIZONTAL LINE -->
    <tr>
        <td height="1" bgcolor="black"></td>
    </tr>

    <!-- LOGIN FORM AREA (Replacing headlines) -->
    <tr>
        <td>
            <table width="100%" border="0" cellpadding="20" cellspacing="0">
                <tr>
                    <td align="center" valign="top">
                        <font face="Times New Roman, serif" size="4" color="black">
                            <b>LOGIN TO HORSENOISE</b><br><br>
                        </font>
                        <form action="/login" method="post" style="font-family: 'Times New Roman', Times, serif; font-size: 16px;">
                            <label for="username">username:</label><br>
                            <input type="text" id="username" name="username" style="width: 250px; padding: 5px;" required><br><br>
                            
                            <label for="password">password:</label><br>
                            <input type="password" id="password" name="password" style="width: 250px; padding: 5px;" required><br><br>
                            
                            <input type="submit" value="login" style="font-size: 16px; padding: 5px 20px; background-color: black; color: white; border: none; cursor: pointer;">
                        </form>
                        <br>
                        <font face="Times New Roman, serif" size="2" color="red">
                            don't have an account? <a href="/register" style="color: red; text-decoration: none;">register here</a>
                        </font>
                    </td>
                </tr>
            </table>
        </td>
    </tr>

    <!-- HORIZONTAL LINE -->
    <tr>
        <td height="1" bgcolor="black"></td>
    </tr>

    <!-- FOOTER COPYRIGHT -->
    <tr>
        <td align="center" height="40">
            <font face="Times New Roman, serif" size="2" color="black">
                &copy; 2026 horsenoise
            </font>
        </td>
    </tr>

</table>

</body>
</html>
